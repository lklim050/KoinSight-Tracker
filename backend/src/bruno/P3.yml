opencollection: 1.0.0
info:
  name: P3
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: server
      variables:
        - name: server
          value: http://localhost:5001
        - name: access_token
          value: ''
        - name: refresh_token
          value: ''
items:
  - info:
      name: DELETE delete transaction
      type: http
      seq: 7
    http:
      method: DELETE
      url: '{{server}}/transactions/:transId'
      params:
        - name: transId
          value: 6a10097b9b6188af268ef32a
          type: path
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: GET assets
      type: http
      seq: 13
    http:
      method: GET
      url: '{{server}}/assets'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: GET read all transactions
      type: http
      seq: 1
    http:
      method: GET
      url: '{{server}}/transactions'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: GET seed all transactions
      type: http
      seq: 3
    http:
      method: GET
      url: '{{server}}/transactions/seed'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: GET seed assets
      type: http
      seq: 11
    http:
      method: GET
      url: '{{server}}/assets/seed'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: PATCH update transaction
      type: http
      seq: 6
    http:
      method: PATCH
      url: '{{server}}/transactions/:transId'
      params:
        - name: transId
          value: 6a11c8128e8eeba0b210a700
          type: path
      body:
        type: json
        data: |-
          {
            "coinType":"monero",
            "transType":"SELL",
            "notes":"updated"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: POST find transaction
      type: http
      seq: 8
    http:
      method: POST
      url: '{{server}}/transactions/:transId'
      params:
        - name: transId
          value: 6a0b0f79e03e3f8a0c7caea9
          type: path
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: POST login
      type: http
      seq: 9
    http:
      method: POST
      url: '{{server}}/auth/login'
      body:
        type: json
        data: |-
          {
            "username":"newUser125",
            "password":"password123"
          }
      auth: inherit
    runtime:
      scripts:
        - type: after-response
          code: |-
            const jsonData = res.getBody();
            bru.setEnvVar("access_token",jsonData.access);
            bru.setEnvVar("refresh_token",jsonData.refresh);
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: PUT create transaction
      type: http
      seq: 4
    http:
      method: PUT
      url: '{{server}}/transactions'
      body:
        type: json
        data: |-
          {
            "transType":"Buy",
            "coinType": "somecoin",
            "quantity": 200,
            "pricePerCoin": 0.01,
            "notes":"test transaction, some coin for me to buy haha",
            "date":"10/06/2026",
            "time":"14:00"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: PUT refresh access
      type: http
      seq: 11
    http:
      method: POST
      url: '{{server}}/auth/refresh'
      body:
        type: json
        data: |-
          {
            "refresh":"{{refresh_token}}"
          }
      auth: inherit
    runtime:
      scripts:
        - type: after-response
          code: |-
            const jsonData = res.getBody();
            bru.setEnvVar("access_token",jsonData.access);
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: PUT register
      type: http
      seq: 10
    http:
      method: PUT
      url: '{{server}}/auth/register'
      body:
        type: json
        data: |-
          {
            "username":"newUser125",
            "password":"password123"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
request:
  auth:
    type: bearer
    token: '{{access_token}}'
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-05-23T15:41:15.362Z'
    exportedUsing: Bruno
